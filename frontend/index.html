<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content" />
    <link rel="icon" href="/favicon.ico" />
    <title>assistant</title>
    <!-- Font loading: Bricolage Grotesque (display) + DM Sans (body) + JetBrains Mono (code) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  </head>
  <body>
    <script>
      // Apply theme + background before first paint to prevent white flash
      (function() {
        var theme = localStorage.getItem("theme");
        var dark = theme === "dark" || (!theme && window.matchMedia("(prefers-color-scheme: dark)").matches);
        if (dark) {
          document.documentElement.classList.add("dark");
          document.documentElement.style.backgroundColor = "#0C0A09";
        } else {
          document.documentElement.style.backgroundColor = "#FAF9F7";
        }
      })();
    </script>
    <div id="root" class="grain-overlay"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
